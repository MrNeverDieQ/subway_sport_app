name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool \
            libffi-dev libssl-dev libsqlite3-dev \
            python3-pip ccache
          pip install buildozer cython

      - name: Cache buildozer global
        uses: actions/cache@v5
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Accept Android SDK licenses and install build-tools
        run: |
          SDKMANAGER=$(find ~/.buildozer -name sdkmanager 2>/dev/null | head -1)
          if [ -n "$SDKMANAGER" ]; then
            yes 2>/dev/null | "$SDKMANAGER" --licenses || true
            "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-33" || true
          fi

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
          grep -E "^(Error|Traceback|# Build)" build.log || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subway-sport-apk
          path: bin/*.apk
